<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Mentor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0B0F14;
      color: #E5E7EB;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #1F2937;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #6366F1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
    }
    .title { font-size: 15px; font-weight: 600; }
    .content { padding: 16px; }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9CA3AF;
      margin-bottom: 8px;
    }
    .mode-btn {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #1F2937;
      border-radius: 10px;
      background: #111827;
      color: #9CA3AF;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 6px;
      transition: all 0.15s;
    }
    .mode-btn:hover { border-color: #6366F1; color: #E5E7EB; }
    .mode-btn.active {
      border-color: #6366F1;
      background: rgba(99, 102, 241, 0.1);
      color: #6366F1;
    }
    .mode-label { font-weight: 500; }
    .mode-desc { font-size: 11px; color: #6B7280; margin-top: 2px; }
    .btn-primary {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: #6366F1;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #5558E6; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 12px;
    }
    .status.active { background: rgba(99, 102, 241, 0.1); color: #6366F1; }
    .status.inactive { background: rgba(107, 114, 128, 0.1); color: #9CA3AF; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #1F2937;
      font-size: 11px;
      color: #6B7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">V</div>
    <span class="title">Vibe Mentor</span>
  </div>
  <div class="content">
    <div class="section">
      <div class="section-title">Guidance Mode</div>
      <button class="mode-btn" data-mode="observe">
        <div class="mode-label">Observe</div>
        <div class="mode-desc">Watch only, no guidance</div>
      </button>
      <button class="mode-btn active" data-mode="guidance">
        <div class="mode-label">Guidance</div>
        <div class="mode-desc">Show where to click & type</div>
      </button>
      <button class="mode-btn" data-mode="review">
        <div class="mode-label">Review</div>
        <div class="mode-desc">Replay and feedback</div>
      </button>
    </div>

    <button id="toggleBtn" class="btn-primary">Activate Guidance</button>

    <div id="status" class="status inactive">
      Extension inactive on this page
    </div>
  </div>
  <div class="footer">
    Vibe Mentor v1.0.0
  </div>

  <script>
    let active = false;

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
          chrome.tabs.sendMessage(tabs[0].id, {
            type: 'SET_MODE',
            mode: btn.dataset.mode
          });
        });
      });
    });

    document.getElementById('toggleBtn').addEventListener('click', () => {
      active = !active;
      const btn = document.getElementById('toggleBtn');
      const status = document.getElementById('status');

      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        chrome.tabs.sendMessage(tabs[0].id, {
          type: 'TOGGLE_GUIDANCE',
          active
        });

        if (active) {
          btn.textContent = 'Deactivate Guidance';
          btn.style.background = '#EF4444';
          status.textContent = 'Active - watching your screen';
          status.className = 'status active';
        } else {
          btn.textContent = 'Activate Guidance';
          btn.style.background = '#6366F1';
          status.textContent = 'Extension inactive on this page';
          status.className = 'status inactive';
        }
      });
    });
  </script>
</body>
</html>
